name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main  # change this to your branch if needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.14.0'  # set your Node version

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build  # optional, depends if your app has a build step

      - name: Archive files for deployment
        run: zip -r app.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: YOUR_APP_NAME      # Replace with your Azure App Service name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip